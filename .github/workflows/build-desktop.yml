name: Build Desktop Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS .app
            os: macos-latest
            command: npm run package:mac:app
            artifact_name: macos-app
            artifact_path: release/mac*/Markdown PDF Renderer.app
          - name: Windows .exe
            os: windows-latest
            command: npm run package:win:exe
            artifact_name: windows-exe
            artifact_path: release/*.exe
          - name: Linux AppImage
            os: ubuntu-latest
            command: npm run package:linux
            artifact_name: linux-appimage
            artifact_path: release/*.AppImage

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build platform artifact
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error